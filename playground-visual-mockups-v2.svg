<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="5200" viewBox="0 0 1600 5200">
  <defs>
    <style>
      .bg{fill:#f7f1e8}.ink{fill:#101722}.muted{fill:#5e6877}.cream{fill:#fffaf2}.navy{fill:#151f2b}.pink{fill:#ffd0df}.blue{fill:#bfe5ff}.lime{fill:#d8ff68}.orange{fill:#ffad70}.lav{fill:#d9ccff}
      .h{font:900 74px Inter,Arial,sans-serif;letter-spacing:-4px}.h2{font:900 48px Inter,Arial,sans-serif;letter-spacing:-2px}.p{font:500 22px Inter,Arial,sans-serif}.mono{font:800 18px ui-monospace,Menlo,monospace;letter-spacing:2px}.tiny{font:800 13px ui-monospace,Menlo,monospace;letter-spacing:1.8px}.serif{font:italic 900 82px Georgia,serif}
      .stroke{stroke:#151f2b;stroke-width:3}.soft{stroke:#d8d0c4;stroke-width:3}.shadow{filter:drop-shadow(10px 14px 0 rgba(16,23,34,.15))}
    </style>
    <pattern id="dots" width="42" height="42" patternUnits="userSpaceOnUse"><circle cx="4" cy="4" r="2" fill="#ffffff" opacity=".24"/></pattern>
    <pattern id="grain" width="12" height="12" patternUnits="userSpaceOnUse"><circle cx="2" cy="3" r=".8" fill="#101722" opacity=".05"/><circle cx="8" cy="8" r=".7" fill="#101722" opacity=".035"/></pattern>
  </defs>
  <rect width="1600" height="5200" class="bg"/>
  <rect width="1600" height="5200" fill="url(#grain)"/>
  <text x="72" y="86" class="mono ink">PLAYGROUND VISUAL DIRECTIONS / QUIRKY OS EDITION</text>
  <text x="72" y="132" class="p muted">Five first-glance concepts for displaying smaller projects as an experience, not a normal grid.</text>

  <!-- 01 Folder Collage Desktop -->
  <g transform="translate(70 190)">
    <rect width="1460" height="860" rx="34" fill="#74809d"/>
    <rect width="1460" height="860" rx="34" fill="url(#dots)"/>
    <rect x="32" y="34" width="1396" height="58" rx="29" class="navy"/>
    <text x="58" y="70" fill="#fffaf2" class="mono">CONCEPT 01  /  FOLDER COLLAGE DESKTOP</text>
    <text x="620" y="280" fill="#fffaf2" class="tiny">HI, I'M PRAVALLIKA</text>
    <text x="430" y="390" fill="#fffaf2" class="h">Playground</text>
    <text x="462" y="438" fill="#fffaf2" class="p">a folder where small ideas misbehave nicely</text>
    <g transform="translate(150 260)">
      <path d="M0 34h86l18 28h132v112q0 22-22 22H22Q0 196 0 174z" fill="url(#fg1)"/>
      <path d="M0 34h86l18 28h132v112q0 22-22 22H22Q0 196 0 174z" fill="#c9e8bd"/><rect x="62" y="206" width="120" height="30" rx="15" fill="#fffaf2"/><text x="78" y="227" class="tiny ink">niche_games</text>
    </g>
    <g transform="translate(1110 250)">
      <path d="M0 34h86l18 28h132v112q0 22-22 22H22Q0 196 0 174z" class="blue"/><rect x="58" y="206" width="118" height="30" rx="15" fill="#fffaf2"/><text x="74" y="227" class="tiny ink">motion_tests</text>
    </g>
    <g transform="translate(250 590)">
      <path d="M0 34h86l18 28h132v112q0 22-22 22H22Q0 196 0 174z" class="orange"/><rect x="70" y="206" width="90" height="30" rx="15" fill="#fffaf2"/><text x="85" y="227" class="tiny ink">tiny_ui</text>
    </g>
    <g transform="translate(1020 596)">
      <path d="M0 34h86l18 28h132v112q0 22-22 22H22Q0 196 0 174z" class="pink"/><rect x="56" y="206" width="128" height="30" rx="15" fill="#fffaf2"/><text x="72" y="227" class="tiny ink">archive_finds</text>
    </g>
    <g transform="translate(970 450)">
      <rect width="300" height="150" rx="24" class="navy"/>
      <text x="28" y="44" fill="#b8c2cf" class="tiny">HEY INTERNET FRIEND</text>
      <text x="28" y="84" fill="#fffaf2" class="p">Pick a folder.</text>
      <rect x="28" y="106" width="110" height="34" rx="17" fill="#fffaf2"/><text x="49" y="129" class="tiny ink">open</text>
    </g>
    <text x="52" y="815" fill="#fffaf2" class="p">Feels like: your current desktop, but the project folders become the interface.</text>
  </g>

  <!-- 02 Retro Computer Toybox -->
  <g transform="translate(70 1130)">
    <rect width="1460" height="860" rx="34" fill="#ffe5b5"/>
    <text x="40" y="64" class="mono ink">CONCEPT 02  /  RETRO COMPUTER TOYBOX</text>
    <rect x="180" y="160" width="1240" height="560" rx="28" fill="#f4d4a9" class="stroke"/>
    <rect x="360" y="210" width="650" height="390" rx="35" fill="#ded8c7" class="stroke shadow"/>
    <rect x="410" y="260" width="550" height="270" rx="12" fill="#1267e8"/>
    <text x="520" y="372" fill="#fff4a3" style="font:900 58px ui-monospace,monospace">PLAYGROUND</text>
    <rect x="575" y="410" width="220" height="26" fill="#fff4a3"/><rect x="575" y="410" width="126" height="26" fill="#111722"/>
    <text x="640" y="470" fill="#fffaf2" class="mono">loading ideas...</text>
    <rect x="472" y="618" width="420" height="54" rx="8" fill="#eae3d4" class="stroke"/>
    <circle cx="1090" cy="545" r="38" class="pink stroke"/><circle cx="1180" cy="545" r="38" class="lime stroke"/>
    <rect x="190" y="210" width="120" height="170" rx="18" class="blue stroke"/><text x="210" y="308" class="tiny ink">STICKER</text>
    <rect x="1110" y="205" width="150" height="110" rx="14" class="pink stroke" transform="rotate(8 1185 260)"/><text x="1144" y="267" class="tiny ink">NOTE</text>
    <rect x="1120" y="642" width="170" height="46" rx="23" class="navy"/><text x="1150" y="672" fill="#fffaf2" class="tiny">Niche Games</text>
    <rect x="1230" y="355" width="130" height="46" rx="23" class="cream stroke"/><text x="1248" y="385" class="tiny ink">Tiny UI</text>
    <text x="40" y="810" class="p muted">Feels like: a playful startup screen where each project loads inside the monitor.</text>
  </g>

  <!-- 03 Cassette Mixtape -->
  <g transform="translate(70 2070)">
    <rect width="1460" height="860" rx="34" fill="#f3f0ea"/>
    <text x="40" y="64" class="mono ink">CONCEPT 03  /  CASSETTE MIXTAPE</text>
    <text x="98" y="176" class="h ink">Playground, side A</text>
    <text x="102" y="220" class="p muted">Projects as tracks: each one has a mood, artifact, and small lesson.</text>
    <g transform="translate(360 285) rotate(-7)">
      <rect width="790" height="310" rx="34" fill="#fff" class="stroke shadow"/>
      <rect x="60" y="70" width="670" height="150" rx="18" fill="#f1f1f1" class="stroke"/>
      <circle cx="255" cy="145" r="54" fill="#fff" class="stroke"/><circle cx="535" cy="145" r="54" fill="#fff" class="stroke"/>
      <rect x="340" y="108" width="110" height="78" rx="12" class="ink"/>
      <text x="302" y="260" style="font:italic 52px Georgia,serif" class="ink">Still Blank</text>
    </g>
    <g transform="translate(1040 160)">
      <rect width="260" height="470" rx="18" class="cream soft"/>
      <rect x="30" y="38" width="200" height="60" rx="12" class="orange"/><text x="62" y="76" class="tiny ink">TRACK 01</text>
      <rect x="30" y="128" width="200" height="60" rx="12" class="blue"/><text x="62" y="166" class="tiny ink">TRACK 02</text>
      <rect x="30" y="218" width="200" height="60" rx="12" class="pink"/><text x="62" y="256" class="tiny ink">TRACK 03</text>
      <rect x="30" y="308" width="200" height="60" rx="12" class="lime"/><text x="62" y="346" class="tiny ink">BONUS</text>
    </g>
    <text x="98" y="690" class="h2 ink">Niche Games / Motion Tests / Tiny Interfaces / Archive Finds</text>
    <text x="98" y="740" class="p muted">Feels like: an experimental playlist, perfect for small pieces that do not need case-study weight.</text>
  </g>

  <!-- 04 Internet Gems Scrapbook -->
  <g transform="translate(70 3010)">
    <rect width="1460" height="860" rx="34" fill="#fffdf8"/>
    <text x="40" y="64" class="mono ink">CONCEPT 04  /  INTERNET GEMS SCRAPBOOK</text>
    <text x="95" y="180" style="font:900 92px Georgia,serif" class="ink">Internet</text>
    <text x="95" y="260" style="font:900 92px Georgia,serif" class="ink">Gems</text>
    <text x="100" y="304" class="p muted">A collection of tiny experiments and what they taught me.</text>
    <rect x="90" y="350" width="190" height="34" rx="17" class="cream stroke"/><text x="116" y="373" class="tiny ink">platform: all</text>
    <rect x="300" y="350" width="210" height="34" rx="17" class="cream stroke"/><text x="326" y="373" class="tiny ink">category: playful</text>
    <rect x="530" y="350" width="230" height="34" rx="17" class="cream stroke"/><text x="556" y="373" class="tiny ink">mood: unfinished</text>
    <g transform="translate(92 430)"><rect width="280" height="170" rx="22" class="pink stroke"/><text x="22" y="134" class="h2 ink">Sing</text><text x="22" y="158" class="tiny ink">motion study</text></g>
    <g transform="translate(400 430)"><rect width="280" height="170" rx="22" class="blue stroke"/><text x="22" y="134" class="h2 ink">Niche</text><text x="22" y="158" class="tiny ink">games archive</text></g>
    <g transform="translate(708 430)"><rect width="280" height="170" rx="22" class="lime stroke"/><text x="22" y="134" class="h2 ink">Tiny UI</text><text x="22" y="158" class="tiny ink">interface notes</text></g>
    <g transform="translate(1016 430)"><rect width="280" height="170" rx="22" class="orange stroke"/><text x="22" y="134" class="h2 ink">Finds</text><text x="22" y="158" class="tiny ink">saved references</text></g>
    <rect x="1080" y="142" width="120" height="120" rx="28" fill="#f2c9ff" transform="rotate(20 1140 202)" opacity=".9"/>
    <text x="96" y="742" class="p muted">Feels like: a curated internet shelf, more elegant than chaotic, still strange at first glance.</text>
  </g>

  <!-- 05 Weird Toy Store Map -->
  <g transform="translate(70 3950)">
    <rect width="1460" height="860" rx="34" fill="#acd9d4"/>
    <text x="40" y="64" class="mono ink">CONCEPT 05  /  WEIRD SHOP MAP</text>
    <rect x="50" y="110" width="240" height="650" rx="20" fill="#8f947f" class="stroke"/>
    <rect x="78" y="150" width="150" height="74" rx="12" class="cream stroke"/><text x="105" y="194" class="tiny ink">SHOP</text>
    <rect x="78" y="246" width="150" height="48" rx="8" class="cream stroke"/><text x="101" y="277" class="tiny ink">ALL IDEAS</text>
    <rect x="78" y="314" width="150" height="48" rx="8" class="cream stroke"/><text x="105" y="345" class="tiny ink">DRAFTS</text>
    <rect x="78" y="382" width="150" height="48" rx="8" class="cream stroke"/><text x="103" y="413" class="tiny ink">MOTION</text>
    <path d="M360 690c160-260 310-260 450-92 110-180 300-180 470 54v108H360z" fill="#d8ffbd" class="stroke"/>
    <ellipse cx="650" cy="655" rx="220" ry="78" fill="#75c6d6" class="stroke"/>
    <rect x="525" y="340" width="170" height="120" rx="18" class="pink stroke"/><text x="555" y="410" class="tiny ink">Niche Games</text>
    <rect x="780" y="270" width="190" height="130" rx="18" class="orange stroke"/><text x="820" y="342" class="tiny ink">Tiny Interfaces</text>
    <rect x="1020" y="420" width="190" height="130" rx="18" class="blue stroke"/><text x="1056" y="492" class="tiny ink">Archive Finds</text>
    <rect x="690" y="515" width="190" height="130" rx="18" class="lime stroke"/><text x="728" y="588" class="tiny ink">Motion Tests</text>
    <text x="420" y="196" class="h ink">Playground</text>
    <text x="424" y="240" class="p muted">A tiny world of experiments you can wander through.</text>
    <text x="410" y="805" class="p muted">Feels like: the most playful option, but it needs restraint so it still feels portfolio-grade.</text>
  </g>
</svg>
