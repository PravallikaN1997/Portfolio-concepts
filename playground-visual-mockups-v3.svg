<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="5400" viewBox="0 0 1800 5400" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <style>
      .label{font:800 18px ui-monospace,Menlo,monospace;letter-spacing:.16em}.tiny{font:800 13px ui-monospace,Menlo,monospace;letter-spacing:.12em}.body{font:500 24px Inter,Arial,sans-serif}.h1{font:900 92px Inter,Arial,sans-serif;letter-spacing:-.065em}.h2{font:900 50px Inter,Arial,sans-serif;letter-spacing:-.035em}.serif{font:800 88px Georgia,serif;letter-spacing:-.035em}.ink{fill:#111722}.muted{fill:#657184}.paper{fill:#f8f3ea}.line{stroke:#d8d0c4;stroke-width:2}.dark{fill:#121925}.cream{fill:#fffaf2}.shadow{filter:drop-shadow(0 24px 46px rgba(17,23,34,.16))}
    </style>
    <pattern id="tone" width="10" height="10" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1.2" fill="#111722" opacity=".16"/></pattern>
    <linearGradient id="sky" x1="0" x2="1"><stop stop-color="#bfe6ff"/><stop offset=".65" stop-color="#f6d4e5"/><stop offset="1" stop-color="#fff5cb"/></linearGradient>
  </defs>
  <rect width="1800" height="5400" fill="#ece7de"/>
  <text x="80" y="92" class="label ink">PLAYGROUND / HIGH-LEVEL VISUAL DIRECTIONS</text>
  <text x="80" y="136" class="body" fill="#657184">Five cleaner concepts with stronger first-glance worlds. Each one can hold 4-5 smaller projects without feeling like a normal grid.</text>

  <!-- 01 Manhwa reader -->
  <g transform="translate(80 210)">
    <rect width="1640" height="900" rx="34" fill="#fffaf2"/>
    <rect x="40" y="38" width="1560" height="74" rx="37" fill="#111722"/>
    <text x="70" y="84" fill="#fffaf2" class="label">01 / MANHWA READER</text>
    <text x="1290" y="84" fill="#fffaf2" class="label">CHAPTER LIST</text>
    <text x="70" y="206" class="serif ink">Playground</text>
    <text x="76" y="252" class="body" fill="#657184">Small projects as chapters in a visual story archive.</text>
    <g transform="translate(72 310)">
      <rect width="460" height="470" rx="20" fill="#fff" stroke="#111722" stroke-width="3"/>
      <rect x="24" y="24" width="412" height="220" rx="14" fill="url(#tone)" stroke="#111722" stroke-width="2"/>
      <path d="M70 220c90-80 170-80 260 0" fill="none" stroke="#111722" stroke-width="7"/>
      <text x="28" y="310" class="label ink">CH 01</text><text x="28" y="365" class="h2 ink">Niche Games</text><text x="28" y="414" class="body" fill="#657184">A tiny cultural interface archive.</text>
    </g>
    <g transform="translate(600 270)">
      <rect width="360" height="560" rx="18" fill="#111722"/>
      <rect x="28" y="28" width="304" height="118" rx="12" fill="#fffaf2"/><text x="52" y="100" class="h2 ink">Motion Tests</text>
      <rect x="28" y="170" width="304" height="118" rx="12" fill="#fffaf2"/><text x="52" y="242" class="h2 ink">Tiny UI</text>
      <rect x="28" y="312" width="304" height="118" rx="12" fill="#fffaf2"/><text x="52" y="384" class="h2 ink">Archive Finds</text>
    </g>
    <g transform="translate(1040 230)">
      <rect width="470" height="600" rx="24" fill="#f0e5d6" stroke="#d8d0c4" stroke-width="2"/>
      <text x="40" y="70" class="label ink">SELECTED PANEL</text>
      <rect x="40" y="112" width="390" height="260" rx="16" fill="#fff" stroke="#111722" stroke-width="3"/>
      <text x="70" y="450" class="h2 ink">Why this works</text>
      <text x="70" y="505" class="body" fill="#657184">Each project feels like a page turn, not a portfolio card.</text>
    </g>
  </g>

  <!-- 02 Editorial objects -->
  <g transform="translate(80 1220)">
    <rect width="1640" height="900" rx="34" fill="#f4efe6"/>
    <text x="50" y="76" class="label ink">02 / EDITORIAL OBJECT TABLE</text>
    <text x="52" y="190" class="h1 ink">A desk of unfinished things.</text>
    <text x="58" y="244" class="body" fill="#657184">Projects appear as objects: labels, receipts, thumbnails, notes, and tiny artifacts.</text>
    <rect x="72" y="340" width="420" height="300" rx="20" fill="#ffd5df" stroke="#111722" stroke-width="3" transform="rotate(-4 282 490)"/>
    <text x="118" y="460" class="h2 ink" transform="rotate(-4 282 490)">Niche Games</text>
    <rect x="555" y="300" width="420" height="360" rx="28" fill="#cfe9ff" stroke="#111722" stroke-width="3" transform="rotate(3 765 480)"/>
    <text x="610" y="455" class="h2 ink" transform="rotate(3 765 480)">Motion Tests</text>
    <rect x="990" y="360" width="410" height="270" rx="18" fill="#dcff72" stroke="#111722" stroke-width="3" transform="rotate(-2 1195 495)"/>
    <text x="1045" y="482" class="h2 ink" transform="rotate(-2 1195 495)">Tiny UI</text>
    <rect x="1120" y="150" width="270" height="130" rx="14" fill="#fffaf2" stroke="#111722" stroke-width="3" transform="rotate(8 1255 215)"/>
    <text x="1160" y="226" class="label ink" transform="rotate(8 1255 215)">ARCHIVE FINDS</text>
    <path d="M124 700c340 80 760 80 1250-10" fill="none" stroke="#111722" stroke-width="3" stroke-dasharray="9 12" opacity=".35"/>
  </g>

  <!-- 03 Dream console -->
  <g transform="translate(80 2230)">
    <rect width="1640" height="900" rx="34" fill="url(#sky)"/>
    <text x="50" y="76" class="label ink">03 / DREAM CONSOLE</text>
    <text x="110" y="190" class="h1 ink">Choose a save file.</text>
    <text x="116" y="242" class="body" fill="#4e5b6e">A game-menu playground where projects are save slots.</text>
    <rect x="185" y="320" width="1270" height="470" rx="42" fill="#fffaf2" stroke="#111722" stroke-width="4" class="shadow"/>
    <rect x="240" y="380" width="520" height="330" rx="28" fill="#121925"/>
    <text x="294" y="462" fill="#fffaf2" class="h2">PLAYGROUND</text>
    <text x="298" y="518" fill="#b8c4d5" class="label">loading small experiments...</text>
    <rect x="830" y="380" width="520" height="62" rx="31" fill="#ffd5df" stroke="#111722" stroke-width="3"/><text x="870" y="421" class="label ink">SAVE 01 / NICHE GAMES</text>
    <rect x="830" y="470" width="520" height="62" rx="31" fill="#dcff72" stroke="#111722" stroke-width="3"/><text x="870" y="511" class="label ink">SAVE 02 / MOTION TESTS</text>
    <rect x="830" y="560" width="520" height="62" rx="31" fill="#cfe9ff" stroke="#111722" stroke-width="3"/><text x="870" y="601" class="label ink">SAVE 03 / TINY INTERFACES</text>
    <rect x="830" y="650" width="520" height="62" rx="31" fill="#fff0a8" stroke="#111722" stroke-width="3"/><text x="870" y="691" class="label ink">SAVE 04 / ARCHIVE FINDS</text>
  </g>

  <!-- 04 Bookstore shelf -->
  <g transform="translate(80 3240)">
    <rect width="1640" height="900" rx="34" fill="#101722"/>
    <text x="50" y="76" fill="#fffaf2" class="label">04 / MANGA BOOKSTORE SHELF</text>
    <text x="72" y="190" fill="#fffaf2" class="serif">Playground volumes</text>
    <text x="78" y="240" fill="#c1cad8" class="body">A calmer, beautiful route: projects as volumes on a shelf.</text>
    <rect x="110" y="680" width="1360" height="36" fill="#fffaf2"/>
    <g transform="translate(150 330)">
      <rect width="210" height="350" rx="10" fill="#ffd5df"/><text x="36" y="60" class="label ink">VOL 01</text><text x="32" y="310" class="h2 ink" transform="rotate(-90 32 310)">NICHE</text>
      <rect x="240" width="210" height="350" rx="10" fill="#cfe9ff"/><text x="276" y="60" class="label ink">VOL 02</text><text x="272" y="310" class="h2 ink" transform="rotate(-90 272 310)">MOTION</text>
      <rect x="480" width="210" height="350" rx="10" fill="#dcff72"/><text x="516" y="60" class="label ink">VOL 03</text><text x="512" y="310" class="h2 ink" transform="rotate(-90 512 310)">TINY UI</text>
      <rect x="720" width="210" height="350" rx="10" fill="#ffb475"/><text x="756" y="60" class="label ink">VOL 04</text><text x="752" y="310" class="h2 ink" transform="rotate(-90 752 310)">FINDS</text>
    </g>
    <rect x="1120" y="318" width="300" height="370" rx="18" fill="#fffaf2"/>
    <text x="1160" y="390" class="label ink">OPEN VOLUME</text><text x="1160" y="466" class="h2 ink">Tiny Interfaces</text><text x="1160" y="526" class="body" fill="#657184">One spread. One artifact. One takeaway.</text>
  </g>

  <!-- 05 Museum arcade -->
  <g transform="translate(80 4250)">
    <rect width="1640" height="900" rx="34" fill="#f8f3ea"/>
    <text x="50" y="76" class="label ink">05 / SOFT ARCADE GALLERY</text>
    <text x="76" y="190" class="h1 ink">The small-ideas arcade.</text>
    <text x="82" y="242" class="body" fill="#657184">A refined arcade wall: playful, but cleaner than neon chaos.</text>
    <rect x="110" y="330" width="300" height="390" rx="32" fill="#ffd5df" stroke="#111722" stroke-width="4"/>
    <rect x="150" y="382" width="220" height="170" rx="16" fill="#111722"/><text x="178" y="480" fill="#fffaf2" class="label">NICHE</text><circle cx="195" cy="636" r="22" fill="#dcff72" stroke="#111722" stroke-width="3"/><circle cx="255" cy="636" r="22" fill="#cfe9ff" stroke="#111722" stroke-width="3"/>
    <rect x="480" y="280" width="300" height="440" rx="32" fill="#cfe9ff" stroke="#111722" stroke-width="4"/>
    <rect x="520" y="340" width="220" height="190" rx="16" fill="#111722"/><text x="548" y="448" fill="#fffaf2" class="label">MOTION</text>
    <rect x="850" y="330" width="300" height="390" rx="32" fill="#dcff72" stroke="#111722" stroke-width="4"/>
    <rect x="890" y="382" width="220" height="170" rx="16" fill="#111722"/><text x="920" y="480" fill="#fffaf2" class="label">TINY UI</text>
    <rect x="1220" y="280" width="300" height="440" rx="32" fill="#ffb475" stroke="#111722" stroke-width="4"/>
    <rect x="1260" y="340" width="220" height="190" rx="16" fill="#111722"/><text x="1290" y="448" fill="#fffaf2" class="label">ARCHIVE</text>
  </g>
</svg>
